services:

  mysql_db:
    image: mysql:8.0
    container_name: itau-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: admin_password_123
      MYSQL_DATABASE: itau_corretora_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.0.1
    container_name: itau-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.0.1
    container_name: itau-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: itau-zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://itau-kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "9092"]
      interval: 10s
      timeout: 5s
      retries: 10

  compra-programada-api:
    image: itau/compra-programada-api
    build:
      context: ./src
      dockerfile: CompraProgramada.Api/Dockerfile
    container_name: itau-compra-programada-api
    depends_on:
      - mysql_db
      - kafka
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - Kafka__BootstrapServers=kafka:9092
      - Kafka__TopicDistribuicaoIrDedoDuro=distribuicao-ir-dedoduro
    volumes:
      - ./cotacoes:/app/cotacoes

  compra-programada-worker:
    image: itau/compra-programada-worker
    build:
      context: ./src
      dockerfile: CompraProgramada.Worker/Dockerfile
    container_name: itau-compra-programada-worker
    depends_on:
      - mysql_db
      - kafka
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Kafka__BootstrapServers: kafka:9092
      Kafka__TopicDistribuicaoIrDedoDuro: distribuicao-ir-dedoduro
    volumes:
      - ./cotacoes:/app/cotacoes

volumes:
  mysql_data: